<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Think Again 💭</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  background: radial-gradient(circle at bottom right, #ffd166 0%, #0f1724 70%);
  font-family: 'Poppins', sans-serif;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}
.hearts-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.fheart{position:absolute;bottom:-60px;opacity:0;animation:floatUp linear infinite;}
@keyframes floatUp{0%{transform:translateY(0) rotate(0deg);opacity:0;}10%{opacity:0.6;}90%{opacity:0.15;}100%{transform:translateY(-110vh) rotate(30deg);opacity:0;}}

.wrap{position:relative;z-index:10;padding:20px;}
h1{
  font-size:44px;font-weight:800;margin-bottom:12px;
  text-shadow:0 4px 30px rgba(255,209,102,0.5);
  animation:fadeDown 0.8s cubic-bezier(0.34,1.4,0.64,1) both;
}
p.sub{
  font-size:16px;color:rgba(255,255,255,0.6);margin-bottom:40px;
  animation:fadeDown 0.8s 0.15s cubic-bezier(0.34,1.4,0.64,1) both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-30px);}to{opacity:1;transform:translateY(0);}}

.btn-row{
  display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
  animation:fadeUp 0.8s cubic-bezier(0.34,1.4,0.64,1) 0.3s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

button{
  padding:16px 40px;border:none;border-radius:50px;
  font-size:20px;font-weight:700;cursor:pointer;
  transition:transform 0.2s,box-shadow 0.2s;font-family:'Poppins',sans-serif;
}
.yes{
  background:linear-gradient(135deg,#ff6b81,#ff4fa3);color:#fff;
  box-shadow:0 8px 30px rgba(255,107,129,0.5);
}
.yes:hover{transform:scale(1.08);box-shadow:0 12px 40px rgba(255,107,129,0.7);}
.no{
  background:rgba(255,255,255,0.1);color:#fff;
  border:1px solid rgba(255,255,255,0.25);backdrop-filter:blur(10px);
}
.no:hover{background:rgba(255,255,255,0.2);}

footer{position:fixed;bottom:20px;font-size:12px;color:rgba(255,255,255,0.25);z-index:10;font-weight:600;letter-spacing:0.5px;}
footer span{color:rgba(255,180,80,0.7);}
</style>
</head>
<body>
<div class="hearts-bg" id="heartsBg"></div>
<div class="wrap">
  <h1>Think Again 💭</h1>
  <p class="sub">Are you sure? Dil se socho...</p>
  <div class="btn-row">
    <button class="yes" onclick="window.location.href='yes.html'">YES ❤️</button>
    <button class="no" onclick="window.location.href='think-slow.html'">NO</button>
  </div>
</div>
<footer>© For Nandini &nbsp;·&nbsp; Made with <span>💕</span> by Harsh</footer>
<script>
const hbg=document.getElementById("heartsBg");
const hemojis=["💭","💛","✨","🌟","💫","🤔","💡","⭐"];
function spawnHeart(){const el=document.createElement("div");el.className="fheart";el.textContent=hemojis[Math.floor(Math.random()*hemojis.length)];el.style.left=Math.random()*100+"vw";el.style.fontSize=(10+Math.random()*18)+"px";const dur=6+Math.random()*7;el.style.animationDuration=dur+"s";el.style.animationDelay=(Math.random()*2)+"s";hbg.appendChild(el);setTimeout(()=>el.remove(),(dur+2)*1000);}
for(let i=0;i<15;i++)setTimeout(spawnHeart,i*300);
setInterval(spawnHeart,900);
</script>
</body>
</html>
